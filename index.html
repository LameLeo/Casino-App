<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ace Arcade</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/crash.css">
<link rel="stylesheet" href="css/mines.css">
<link rel="stylesheet" href="css/slots.css">
<link rel="stylesheet" href="css/plinko.css">

</head>

<body>

<header class="topbar">

<div class="logo">

🎰 Ace Arcade

</div>

<div class="wallet">

💰 <span id="coins">1000</span>

⭐ Lv <span id="level">1</span>

</div>

</header>

<nav class="navbar">

<button onclick="showPage('home')">🏠</button>

<button onclick="showPage('crash')">🚀</button>

<button onclick="showPage('mines')">💣</button>

<button onclick="showPage('slots')">🎰</button>

<button onclick="showPage('plinko')">🎡</button>

<button onclick="showPage('profile')">👤</button>

</nav>

<main>

<section id="home" class="page active">

<h1>Willkommen bei Ace Arcade</h1>

<div class="card">

<h2>Dashboard</h2>

<p>Dies ist die neue Version 3.</p>

</div>

</section>

<section id="crash" class="page">

<h1>🚀 Crash</h1>

</section>

<section id="mines" class="page">

<h1>💣 Mines</h1>

</section>

<section id="slots" class="page">

<h1>🎰 Slots</h1>

</section>

<section id="plinko" class="page">

<h1>🎡 Plinko</h1>

</section>

<section id="profile" class="page">

<h1>👤 Profil</h1>

</section>

</main>

<script src="app.js"></script>

<script src="games/crash.js"></script>
<script src="games/mines.js"></script>
<script src="games/slots.js"></script>
<script src="games/plinko.js"></script>

</body>

</html>
