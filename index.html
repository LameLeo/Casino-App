<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino PWA Premium</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
background:#07070c;
color:white;
}

.top{
padding:12px;
background:#111;
display:flex;
justify-content:space-between;
}

.nav{
display:flex;
background:#0f0f18;
}

.nav div{
flex:1;
text-align:center;
padding:10px;
cursor:pointer;
}

.page{display:none;padding:10px}
.show{display:block}

.card{
background:#151522;
margin:10px auto;
padding:12px;
width:340px;
border-radius:12px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button:hover{background:#333}

.big{font-size:24px;color:#00ff99}

.grid{
display:grid;
grid-template-columns:repeat(5,45px);
gap:6px;
justify-content:center;
}

.cell{
width:45px;height:45px;
background:#1c1c2d;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
cursor:pointer;
}

.slot{display:flex;justify-content:center}
.reel{
width:55px;height:55px;
background:#1c1c2d;
margin:4px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
font-size:22px;
}

canvas{width:100%;height:120px;background:#0b0b12;border-radius:10px}

</style>
</head>

<body>

<div class="top">
<div>🎰 Casino PWA Premium</div>
<div>💰 <span id="bal">1000</span> | ⭐ <span id="lvl">1</span></div>
</div>

<div class="nav">
<div onclick="show(0)">Crash</div>
<div onclick="show(1)">Mines</div>
<div onclick="show(2)">Slots</div>
<div onclick="show(3)">Plinko</div>
<div onclick="show(4)">Profile</div>
</div>

<!-- CRASH -->
<div class="page show">
<div class="card">
<h3>🚀 Crash</h3>
<div class="big"><span id="m">1.00</span>x</div>
<button onclick="startCrash()">Start</button>
<button onclick="cashOut()">Cash Out</button>
<canvas id="c" width="300" height="120"></canvas>
<p id="cmsg"></p>
</div>
</div>

<!-- MINES -->
<div class="page">
<div class="card">
<h3>💣 Mines</h3>
<button onclick="startMines()">Start</button>
<div class="grid" id="g"></div>
<p id="mmsg"></p>
</div>
</div>

<!-- SLOTS -->
<div class="page">
<div class="card">
<h3>🎰 Slots</h3>
<div class="slot">
<div class="reel" id="r1">❓</div>
<div class="reel" id="r2">❓</div>
<div class="reel" id="r3">❓</div>
</div>
<button onclick="spin()">Spin</button>
<p id="smsg"></p>
</div>
</div>

<!-- PLINKO -->
<div class="page">
<div class="card">
<h3>🎡 Plinko</h3>
<button onclick="drop()">Drop</button>
<p class="big" id="p">🎯</p>
</div>
</div>

<!-- PROFILE -->
<div class="page">
<div class="card">
<h3>👤 Profile</h3>
<p>Balance: <span id="pb"></span></p>
<p>Level: <span id="pl"></span></p>
<button onclick="daily()">🎁 Daily Reward</button>
<button onclick="reset()">Reset</button>
</div>
</div>

<script>

// SAVE
let bal = localStorage.getItem("b")?+localStorage.getItem("b"):1000;
let xp = localStorage.getItem("x")?+localStorage.getItem("x"):0;

function save(){
localStorage.setItem("b",bal);
localStorage.setItem("x",xp);
}

function lvl(){return Math.floor(xp/500)+1;}

function update(){
document.getElementById("bal").innerText=bal;
document.getElementById("lvl").innerText=lvl();
document.getElementById("pb").innerText=bal;
document.getElementById("pl").innerText=lvl();
save();
}

// NAV
function show(i){
document.querySelectorAll(".page").forEach((p,idx)=>{
p.classList.toggle("show",idx===i);
});
}

// SOUND
function beep(f){
let a=new AudioContext();
let o=a.createOscillator();
o.frequency.value=f;
o.connect(a.destination);
o.start();
setTimeout(()=>o.stop(),60);
}

// CRASH
let mult=1,run=false,crashed=false,cashed=false,data=[];

function draw(){
let ctx=document.getElementById("c").getContext("2d");
ctx.clearRect(0,0,300,120);
ctx.beginPath();
ctx.strokeStyle="#00ff99";

data.forEach((v,i)=>{
let x=i*8,y=120-v*18;
if(i==0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});
ctx.stroke();
}

function startCrash(){
mult=1;data=[];run=true;crashed=false;cashed=false;

let i=setInterval(()=>{
mult+=0.06+Math.random()*0.12;
data.push(mult);
document.getElementById("m").innerText=mult.toFixed(2);
draw();

if(Math.random()<0.03){
clearInterval(i);
run=false;crashed=true;
document.getElementById("cmsg").innerText="💥 Crash!";
beep(200);
}
},70);
}

function cashOut(){
if(!run||cashed||crashed)return;
cashed=true;
let win=Math.floor(120*mult);
bal+=win;
xp+=win;
update();
}

// MINES
let active=false;

function startMines(){
let g=document.getElementById("g");
g.innerHTML="";
active=true;

let f=[];
for(let i=0;i<25;i++)f.push(Math.random()<0.22?"💣":"💎");

f.forEach(v=>{
let d=document.createElement("div");
d.className="cell";
d.innerText="?";

d.onclick=()=>{
if(!active)return;
d.innerText=v;

if(v==="💣"){
active=false;
bal-=50;
xp+=20;
document.getElementById("mmsg").innerText="💥 Boom!";
}else{
bal+=25;
xp+=10;
}
update();
};
g.appendChild(d);
});
}

// SLOTS
let s=["🍒","🍋","🔔","⭐","7️⃣"];

function spin(){
let i=0;
let a,b,c;

let anim=setInterval(()=>{
a=s[Math.random()*s.length|0];
b=s[Math.random()*s.length|0];
c=s[Math.random()*s.length|0];

document.getElementById("r1").innerText=a;
document.getElementById("r2").innerText=b;
document.getElementById("r3").innerText=c;

i++;
if(i>12){
clearInterval(anim);

if(a==b&&b==c){
bal+=300;xp+=200;
document.getElementById("smsg").innerText="JACKPOT";
}else{
bal-=20;xp+=5;
document.getElementById("smsg").innerText="-20";
}
update();
}
},70);
}

// PLINKO
function drop(){
let r=[-60,-20,-10,10,20,60];
let v=r[Math.random()*r.length|0];
bal+=v;
xp+=Math.abs(v);
document.getElementById("p").innerText=(v>0?"+":"")+v;
setTimeout(()=>document.getElementById("p").innerText="🎯",800);
update();
}

// PROFILE
function daily(){
bal+=200;xp+=100;
update();
}

function reset(){
bal=1000;xp=0;
update();
}

update();

</script>

</body>
</html>
